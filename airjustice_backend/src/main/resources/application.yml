server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/airjustice;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2

app:
  jwt:
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS"
    expiryMinutes: 120
    otpExpiryMinutes: 5

airjustice:
  monitoring:
    bufferMinutesAfterFlight: 240
  ai:
    # Set your OpenAI API key here (or via env: AIRJUSTICE_AI_OPENAI_KEY)
    openai-key: "${AIRJUSTICE_AI_OPENAI_KEY:}"
    # Set to true to use real GPT-4o extraction; false = mock fallback (no API key needed)
    enabled: true
    # Model to use – gpt-4o supports image input and is the cheapest vision model
    model: "gpt-4o"
    # Max tokens for extraction response (keep low for cost control)
    max-tokens: 512
