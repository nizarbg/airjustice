server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/airjustice;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

app:
  jwt:
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS"
    expiryMinutes: 120
    otpExpiryMinutes: 5
  upload:
    maxFileSizeMb: 10

airjustice:
  monitoring:
    bufferMinutesAfterFlight: 240
  ocr:
    # Path to Tesseract tessdata directory.
    # Leave empty to use bundled data from tess4j (no local install needed).
    tessdata-path: "${AIRJUSTICE_OCR_TESSDATA_PATH:}"
    # OCR language (tess4j bundles 'eng' by default – no install required).
    # To add more languages (e.g. eng+fra), install Tesseract locally and set tessdata-path above.
    language: "eng"
